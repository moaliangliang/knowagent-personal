<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知行 ZhiXing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 标题栏 -->
    <div id="titlebar">
      <div id="titlebar-btns">
        <button class="tb-btn tb-close" id="btn-close" title="关闭"></button>
        <button class="tb-btn tb-minimize" id="btn-hide" title="隐藏"></button>
      </div>
      <span id="title-text">⬡ 知行</span>
    </div>

    <!-- 连接状态 -->
    <div id="status-bar"><span id="status-text" class="off">○ <span id="s-disconnected">Disconnected</span></span></div>

    <!-- 标签页 -->
    <div id="tabs">
      <div class="tab active" data-tab="ai">🤖 <span id="s-ai">AI</span></div>
      <div class="tab" data-tab="chat">💬 <span id="s-chat">Chat</span></div>
      <div class="tab" data-tab="workflow">⚡ <span id="s-workflow">Workflow</span></div>
      <div class="tab" data-tab="todo">📋 <span id="s-tasks">Tasks</span></div>
    </div>

    <!-- AI 对话面板 -->
    <div id="ai-panel" class="panel open">
      <div id="ai-header">
        <span>🤖 AI 助手</span>
        <div id="ai-header-right">
          <span id="ai-usage" style="font-size:10px;color:#999;display:none;"></span>
          <span id="ai-market-btn" title="技能市场">🏪</span>
          <span id="ai-settings-btn" title="设置 API Key">⚙️</span>
        </div>
      </div>
      <div id="ai-msgs"></div>
      <div id="ai-input-wrap">
        <div id="ai-suggestions"></div>
        <div id="ai-input-area">
          <textarea id="ai-input-box" placeholder="用自然语言控制你的 Mac..." rows="1"></textarea>
          <button id="ai-send-btn">➤</button>
        </div>
      </div>
    </div>

    <!-- 命令对话区 -->
    <div id="msgs" class="panel"></div>
    <div id="todo-panel" class="panel"></div>
    <div id="wf-panel" class="panel"></div>
  </div>
  <script src="app.js"></script>
  <script src="workflow.js"></script>
  <script src="ai.js"></script>
</body>
</html>
