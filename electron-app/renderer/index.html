<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知行 ZhiXing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- 标题栏 -->
    <div id="titlebar">
      <div id="titlebar-btns">
        <button class="tb-btn tb-close" id="btn-close" title="关闭"></button>
        <button class="tb-btn tb-minimize" id="btn-hide" title="隐藏"></button>
      </div>
      <span id="title-text">⬡ 知行</span>
    </div>

    <!-- 标签页 -->
    <div id="tabs">
      <div class="tab active" data-tab="ai">💬 <span id="s-ai">对话</span></div>
      <div class="tab" data-tab="workflow">⚡ <span id="s-workflow">工作流</span></div>
      <div class="tab" data-tab="todo">📋 <span id="s-tasks">待办</span></div>
    </div>

    <!-- 统一对话面板 -->
    <div id="ai-panel" class="panel open">
      <div id="ai-header">
        <span>💬 知行</span>
        <div id="ai-header-right">
          <span id="ai-market-btn" title="技能市场">🏪</span>
          <span id="ai-settings-btn" title="设置">⚙️</span>
        </div>
      </div>
      <div id="ai-msgs"></div>
      <div id="ai-input-wrap">
        <div id="ai-input-area">
          <textarea id="ai-input-box" placeholder="输入命令或自然语言..." rows="1"></textarea>
          <button id="ai-send-btn">➤</button>
        </div>
      </div>
    </div>

    <div id="todo-panel" class="panel"></div>
    <div id="wf-panel" class="panel"></div>
  </div>
  <script src="app.js"></script>
  <script src="workflow.js"></script>
  <script src="ai.js"></script>
</body>
</html>
